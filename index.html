<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>物流工作台 - 精简版</title>

    <script src="https://cdn.jsdelivr.net/npm/lunar-javascript/lunar.js"></script>
    <script src="https://yubinbango.github.io/yubinbango/yubinbango.js" charset="UTF-8"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: #f0f3f7; font-family: -apple-system, sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .tab-content { display: none; padding: 10px; flex: 1; overflow-y: auto; padding-bottom: 80px; }
        .tab-content.active { display: block; }
        .tab-bar { position: fixed; bottom: 0; left: 0; width: 100%; height: 60px; background: #fff; display: flex; border-top: 1px solid #e0e0e0; z-index: 9999; }
        .tab-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #8a8a8a; font-size: 10px; cursor: pointer; }
        .tab-item.active { color: #4a90e2; font-weight: bold; }
        .tab-icon { font-size: 20px; margin-bottom: 2px; }
        .module-card { background: #fff; border-radius: 12px; padding: 15px; margin-bottom: 10px; box-shadow: 0 2px 6px rgba(0,0,0,0.046); }
        .title { font-size: 15px; font-weight: bold; margin-bottom: 10px; border-left: 4px solid #4a90e2; padding-left: 8px; }

        .row { margin-bottom: 12px; }
        label { font-size: 12px; font-weight: bold; color: #666; display: block; margin-bottom: 5px; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 15px; outline: none; background: #fff; }

        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; background: #eee; }
        .cal-cell { background: #fff; height: 60px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 14px; position: relative; cursor: pointer; }
        .lunar-text { font-size: 10px; color: #999; margin-top: 2px; }
        .event-dot { position: absolute; bottom: 4px; width: 4px; height: 4px; background: #4a90e2; border-radius: 50%; }
        .today-circle { background: #4a90e2; color: #fff; border-radius: 50%; width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; }

        .btn-main { padding: 12px 5px; border: none; border-radius: 8px; font-weight: bold; color: #fff; cursor: pointer; font-size: 13px; text-align: center; }

        .result-item { padding: 10px; border: 1px solid #eee; border-radius: 8px; margin-bottom: 8px; background: #fafafa; }
        .result-title { font-weight: bold; margin-bottom: 4px; }
        .result-pref { color: #4a90e2; font-weight: bold; }

        .toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.85); color: white; padding: 10px 20px; border-radius: 20px; z-index: 1000; opacity: 0; transition: 0.3s; pointer-events: none; font-size: 13px; }
        .toast.show { opacity: 1; top: 30px; }
    </style>
</head>
<body>

            <option value="HKD">HKD 港元</option>
            <option value="TWD">TWD 新台币</option>
            <option value="KRW">KRW 韩元</option>
            <option value="THB">THB 泰铢</option>
            <option value="GBP">GBP 英镑</option>
            <option value="AUD">AUD 澳元</option>

            <input type="number" id="val-usd-link" value="0" oninput="convertTriple('USD')" style="flex:1; font-size:18px; text-align:center; border:1px solid #ddd; border-radius:8px; padding:8px;">

</div>

<div id="tab4" class="tab-content">

<div id="tab6" class="tab-content">

<script>
let currDate = new Date(), rates = {}, memos = JSON.parse(localStorage.getItem('hcn_calendar_memos') || '{}');

const PREFS = [
    '北海道','青森県','岩手県','宮城県','秋田県','山形県','福島県',
    '茨城県','栃木県','群馬県','埼玉県','千葉県','東京都','神奈川県',
    '新潟県','富山県','石川県','福井県','山梨県','長野県','岐阜県','静岡県','愛知県',
    '三重県','滋賀県','京都府','大阪府','兵庫県','奈良県','和歌山県',
    '鳥取県','島根県','岡山県','広島県','山口県',
    '徳島県','香川県','愛媛県','高知県',
    '福岡県','佐賀県','長崎県','熊本県','大分県','宮崎県','鹿児島県','沖縄県'
];

window.onload = () => { initRates(); renderContainerTable(); };

function switchTab(idx) {
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    document.querySelectorAll('.tab-item').forEach(i => i.classList.remove('active'));
    document.getElementById('tab' + idx).classList.add('active');
    const order = {3: 0, 4: 1, 6: 2};
    document.querySelectorAll('.tab-item')[order[idx]].classList.add('active');
    if(idx === 4) initCalendar();
}

// 汇率转换功能
async function initRates() {
    const cached = localStorage.getItem('hcn_rates_cache');
    if (cached) {
        try {
            const obj = JSON.parse(cached);
            if (obj && obj.rates) {
                rates = obj.rates;
                setRateStatus('已加载缓存汇率');
                convertRate('left');
                convertTriple('JPY');
            }
        } catch (e) {}
    }
    try {
        setRateStatus('汇率更新中...');
        const res = await fetch('https://open.er-api.com/v6/latest/USD');
        const data = await res.json();
        if (data && data.rates) {
            rates = data.rates;
            localStorage.setItem('hcn_rates_cache', JSON.stringify({ ts: Date.now(), rates }));
            setRateStatus('汇率已更新');
            convertRate('left');
            convertTriple('JPY');
        } else {
            setRateStatus('汇率数据异常');
        }
    } catch (e) {
        if (!rates.USD) setRateStatus('汇率获取失败');
    }
}
function convertRate(dir) {
    if(!rates.USD) {
        setRateStatus('汇率未就绪，正在加载...');
        initRates();
        return;
    }
    const from = document.getElementById('cur-left').value, to = document.getElementById('cur-right').value;
    const l = document.getElementById('val-left'), r = document.getElementById('val-right');
    if(dir === 'left') {
        const lv = parseFloat(l.value);
        if (isNaN(lv)) { r.value = ''; return; }
        r.value = (lv / rates[from] * rates[to]).toFixed(2);
    } else {
        const rv = parseFloat(r.value);
        if (isNaN(rv)) { l.value = ''; return; }
        l.value = (rv / rates[to] * rates[from]).toFixed(2);
    }
}

function setRateStatus(msg) {
    const el = document.getElementById('rate-status');
    if (el) el.innerText = msg;
}

function convertTriple(src) {
    if(!rates.USD) {
        setRateStatus('汇率未就绪，正在加载...');
        initRates();
        return;
    }
    const jpyInput = document.getElementById('val-jpy-link');
    const cnyInput = document.getElementById('val-cny-link');
    const usdInput = document.getElementById('val-usd-link');

    let baseUsd = 0;
    if (src === 'JPY') {
        const v = parseFloat(jpyInput.value);
        if (isNaN(v)) { cnyInput.value = ''; usdInput.value = ''; return; }
        baseUsd = v / rates.JPY;
    } else if (src === 'CNY') {
        const v = parseFloat(cnyInput.value);
        if (isNaN(v)) { jpyInput.value = ''; usdInput.value = ''; return; }
        baseUsd = v / rates.CNY;
    } else {
        const v = parseFloat(usdInput.value);
        if (isNaN(v)) { jpyInput.value = ''; cnyInput.value = ''; return; }
        baseUsd = v / rates.USD;
    }

    if (src !== 'JPY') jpyInput.value = (baseUsd * rates.JPY).toFixed(2);
    if (src !== 'CNY') cnyInput.value = (baseUsd * rates.CNY).toFixed(2);
    if (src !== 'USD') usdInput.value = (baseUsd * rates.USD).toFixed(2);
}

// 农历日历
function initCalendar() {
    const grid = document.getElementById('calendar-grid'); grid.innerHTML = '';
    const year = currDate.getFullYear(), month = currDate.getMonth();
    document.getElementById('cal-month-title').innerText = `${year}年 ${month + 1}月`;
    ['日','一','二','三','四','五','六'].forEach(l => grid.innerHTML += `<div class="cal-cell" style="font-weight:bold;height:35px;background:#f8f9fa;">${l}</div>`);
    const first = new Date(year, month, 1).getDay(), days = new Date(year, month + 1, 0).getDate();
    for(let i=0; i<first; i++) grid.innerHTML += `<div class="cal-cell"></div>`;
    for(let d=1; d<=days; d++) {
        const key = `${year}-${month+1}-${d}`,
              isToday = new Date().toDateString() === new Date(year, month, d).toDateString();
        const lunarDate = Lunar.fromDate(new Date(year, month, d));
        const cell = document.createElement('div'); cell.className = 'cal-cell';
        cell.innerHTML = `${isToday?'<div class="today-circle">'+d+'</div>':d}<div class="lunar-text">${lunarDate.getJieQi() || lunarDate.getDayInChinese()}</div>${memos[key]?'<div class="event-dot"></div>':''}`;
        cell.onclick = () => {
            const n = prompt(`备注:`, memos[key]||"");
            if(n!==null) {
                if(!n.trim()) delete memos[key];
                else memos[key]=n;
                localStorage.setItem('hcn_calendar_memos', JSON.stringify(memos));
                initCalendar();
            }
        };
        grid.appendChild(cell);
    }
}
function changeMonth(d) { currDate.setMonth(currDate.getMonth() + d); initCalendar(); }

// 邮编复制
function copyJpAddress() {
    navigator.clipboard.writeText(`〒${document.getElementById('zip-jp').value} ${document.getElementById('region-jp').value}${document.getElementById('locality-jp').value}${document.getElementById('street-jp').value}`)
        .then(() => showToast("地址已复制"));
}

// 地址模糊查询
function extractPrefecture(text) {
    if (!text) return '';
    for (const p of PREFS) {
        if (text.includes(p)) return p;
    }
    return '';
}

async function searchAddress() {
    const q = document.getElementById('addr-query').value.trim();
    const box = document.getElementById('addr-results');
    if (!q) return alert('请输入地址关键词');
    box.innerText = '查询中...';
    try {
        const url = 'https://msearch.gsi.go.jp/address-search/AddressSearch?q=' + encodeURIComponent(q);
        const res = await fetch(url);
        const data = await res.json();
        if (!Array.isArray(data) || data.length === 0) {
            box.innerText = '未找到结果';
            return;
        }
        renderAddressResults(data.slice(0, 8));
    } catch (e) {
        box.innerText = '查询失败，请稍后再试';
    }
}

function renderAddressResults(list) {
    const box = document.getElementById('addr-results');
    box.innerHTML = '';
    list.forEach(item => {
        const title = (item && item.properties && item.properties.title) || item.title || '';
        const pref = extractPrefecture(title) || '未识别';

        const wrap = document.createElement('div');
        wrap.className = 'result-item';

        const t = document.createElement('div');
        t.className = 'result-title';
        t.innerText = title || '（无标题）';

        const p = document.createElement('div');
        p.innerHTML = `所在都道府县：<span class="result-pref">${pref}</span>`;

        const btnRow = document.createElement('div');
        btnRow.style.display = 'flex';
        btnRow.style.gap = '8px';
        btnRow.style.marginTop = '8px';

        const btnPref = document.createElement('button');
        btnPref.className = 'btn-main';
        btnPref.style.background = '#27ae60';
        btnPref.style.flex = '1';
        btnPref.innerText = '复制县名';
        btnPref.onclick = () => copyText(pref);

        const btnAddr = document.createElement('button');
        btnAddr.className = 'btn-main';
        btnAddr.style.background = '#8e44ad';
        btnAddr.style.flex = '1';
        btnAddr.innerText = '复制地址';
        btnAddr.onclick = () => copyText(title);

        btnRow.appendChild(btnPref);
        btnRow.appendChild(btnAddr);

        wrap.appendChild(t);
        wrap.appendChild(p);
        wrap.appendChild(btnRow);

        box.appendChild(wrap);
    });
}

function clearAddressResults() {
    document.getElementById('addr-query').value = '';
    document.getElementById('addr-results').innerHTML = '';
}

function copyText(text) {
    if (!text) return;
    navigator.clipboard.writeText(text).then(() => showToast('已复制'));
}

function showToast(msg) {
    const t = document.getElementById('toast');
    t.innerText = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2000);
}

function toggleContainerLang() {
    containerLang = containerLang === 'zh' ? 'en' : 'zh';
    renderContainerTable();
}

function renderContainerTable() {
    const q = (document.getElementById('container-search')?.value || '').trim().toLowerCase();
    const body = document.getElementById('container-table-body');
    if (!body) return;
    body.innerHTML = '';

    const data = CONTAINER_DATA.filter(row => {
        if (!q) return true;
        const hay = [
            row.typeZh, row.typeEn, row.ext, row.int, row.door, row.vol, row.payload, row.remarkZh, row.remarkEn
        ].join(' ').toLowerCase();
        return hay.includes(q);
    });

    data.forEach((row, idx) => {
        const tr = document.createElement('tr');
        const bg = idx % 2 === 1 ? 'background:#f6fbf1;' : '';

        const typeText = containerLang === 'zh' ? row.typeZh : row.typeEn;
        const remarkText = containerLang === 'zh' ? row.remarkZh : row.remarkEn;
        const extText = row.ext;
        const intText = row.int;
        const doorText = row.door;
        const volText = row.vol;
        const payloadText = row.payload;

        const copyTextLine = `${typeText} | 外部:${extText} | 内部:${intText} | 门:${doorText} | 体积:${volText} | 载重:${payloadText} | 备注:${remarkText}`;

        tr.innerHTML = `
            <td style="padding:8px; border:1px solid #e6efe0; ${bg}">${typeText}</td>
            <td style="padding:8px; border:1px solid #e6efe0; ${bg}">${extText}</td>
            <td style="padding:8px; border:1px solid #e6efe0; ${bg}">${intText}</td>
            <td style="padding:8px; border:1px solid #e6efe0; ${bg}">${doorText}</td>
            <td style="padding:8px; border:1px solid #e6efe0; ${bg}">${volText}</td>
            <td style="padding:8px; border:1px solid #e6efe0; ${bg}">${payloadText}</td>
            <td style="padding:8px; border:1px solid #e6efe0; ${bg}">${remarkText}</td>
            <td style="padding:8px; border:1px solid #e6efe0; ${bg}">
                <button class="btn-main" style="background:#27ae60; padding:6px 8px; font-size:12px;" onclick="copyText('${copyTextLine.replace(/'/g, "\\'")}')">复制</button>
            </td>
        `;
        body.appendChild(tr);
    });
}

function searchFcByCode() {
    const code = document.getElementById('fc-code').value.trim().toUpperCase();
    if (!code) {
        currentFc = null;
        document.getElementById('fc-result').innerHTML = '';
        return;
    }
    currentFc = FC_DATA.find(x => x.code === code) || null;
    renderFcResult();
}

function renderFcResult() {
    const box = document.getElementById('fc-result');
    if (!currentFc) {
        if (document.getElementById('fc-code').value.trim()) {
            box.innerHTML = '<div class="result-item">未找到该仓库代码</div>';
        } else {
            box.innerHTML = '';
        }
        return;
    }

    const rate = parseFloat(document.getElementById('jpy-rate').value || '0');
    const toCny = (jpy) => rate ? (jpy * 1.1 * rate).toFixed(2) : '--';

    box.innerHTML = `
        <div class="result-item">
            <div class="result-title">${currentFc.code} · ${currentFc.name}</div>
            <div style="margin-bottom:6px;">${currentFc.address}</div>
            <div>2t：¥${currentFc.jpy2.toLocaleString()}（含税¥${Math.round(currentFc.jpy2 * 1.1).toLocaleString()}） → ${toCny(currentFc.jpy2)} CNY</div>
            <div>4t：¥${currentFc.jpy4.toLocaleString()}（含税¥${Math.round(currentFc.jpy4 * 1.1).toLocaleString()}） → ${toCny(currentFc.jpy4)} CNY</div>
            <div>10t：¥${currentFc.jpy10.toLocaleString()}（含税¥${Math.round(currentFc.jpy10 * 1.1).toLocaleString()}） → ${toCny(currentFc.jpy10)} CNY</div>
        </div>
    `;
}
